<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bgGrad)" rx="42"/>

  <!-- Simplified handshake at smaller size -->
  <g transform="translate(96, 88)">
    <!-- Left hand -->
    <path d="M-55,8 C-42,6 -25,2 -10,0" stroke="white" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.95"/>
    <path d="M-3,6 C8,8 14,6 20,2" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Right hand -->
    <path d="M55,8 C42,6 25,2 10,0" stroke="white" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.95"/>
    <path d="M3,6 C-8,8 -14,6 -20,2" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Center clasp -->
    <ellipse cx="0" cy="2" rx="12" ry="10" fill="white" opacity="0.9"/>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24" opacity="0.6">
    <polygon points="96,52 98,57 103,58 98,59 96,64 94,59 89,58 94,57"/>
    <polygon points="55,72 57,76 61,77 57,78 55,82 53,78 49,77 53,76"/>
    <polygon points="137,72 139,76 143,77 139,78 137,82 135,78 131,77 135,76"/>
  </g>

  <!-- Small dice left -->
  <g transform="translate(42, 128) rotate(-12)">
    <rect width="22" height="22" rx="4" fill="white" opacity="0.85"/>
    <circle cx="7" cy="7" r="2.5" fill="#ea580c" opacity="0.7"/>
    <circle cx="15" cy="15" r="2.5" fill="#ea580c" opacity="0.7"/>
  </g>

  <!-- Small dice right -->
  <g transform="translate(128, 128) rotate(12)">
    <rect width="22" height="22" rx="4" fill="white" opacity="0.85"/>
    <circle cx="7" cy="7" r="2.5" fill="#ea580c" opacity="0.7"/>
    <circle cx="15" cy="7" r="2.5" fill="#ea580c" opacity="0.7"/>
    <circle cx="7" cy="15" r="2.5" fill="#ea580c" opacity="0.7"/>
    <circle cx="15" cy="15" r="2.5" fill="#ea580c" opacity="0.7"/>
  </g>

  <!-- Text -->
  <text x="96" y="172" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="300" fill="white" text-anchor="middle" letter-spacing="3" opacity="0.8">WAGERPALS</text>
</svg>
